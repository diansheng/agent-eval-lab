id: pr_review_case_004
task_type: pr_review
description: Catch the pagination off-by-one regression
tags: [pagination, off_by_one, correctness, python]
difficulty: easy
priority: high

inputs:
  diff_file: input.diff

run:
  command: '"{{python_executable}}" main.py --diff-file "{{inputs.diff_file}}" --output-file "{{artifacts.output_json}}"'
  cwd: "{{repo_root}}"
  timeout_seconds: 90
  env:
    LLM_PROVIDER: minimax_anthropic

expected:
  output_type: json_file
  output_path: "{{artifacts.output_json}}"
  reference_file: reference.json

judges:
  - name: schema_valid
    type: script
    config:
      script: evals/judges/scripts/schema_valid.py
  - name: hallucination_check
    type: script
    config:
      script: evals/judges/scripts/hallucination_check.py
  - name: finding_recall
    type: script
    config:
      script: evals/judges/scripts/finding_recall.py
